<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Data Penjualan & Stok - Galeri Ar-Rijal Dar'el</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --gold: #C5A35A;
            --dark: #2A1A1A;
            --cream: #F5E6D3;
            --white: #FFF;
            --black: #1E1E1E;
            --gray: #8B7D6B;
            --border: #3B2F2F;
            --danger: #e74c3c;
            --success: #2e7d32;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Montserrat', 'Raleway', sans-serif;
            background: linear-gradient(160deg, #1a0f0f 0%, #2a1a1a 40%, #1e1410 100%);
            color: var(--cream);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(42, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--gold) inset;
            position: relative;
            overflow: hidden;
        }
        .main-container::before,
        .main-container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        .main-container::before {
            top: -40px;
            right: -40px;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(197, 163, 90, 0.25);
        }
        .main-container::after {
            bottom: -30px;
            left: -30px;
            width: 120px;
            height: 120px;
            border: 1px solid rgba(197, 163, 90, 0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        .header .logo-text {
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            font-family: 'Playfair Display', 'Yeseva One', 'Times New Roman', serif;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(197, 163, 90, 0.4);
        }
        .header .sub-logo {
            font-size: 1em;
            color: var(--cream);
            letter-spacing: 1px;
            margin-top: 2px;
            font-style: italic;
        }
        .header .divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto;
            border-radius: 3px;
        }
        .date-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            z-index: 1;
            position: relative;
        }
        .date-section label {
            font-weight: 600;
            color: var(--gold);
            font-size: 1.05em;
        }
        .date-section input[type="date"] {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: var(--dark);
            color: var(--cream);
            font-size: 1em;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .date-section input[type="date"]:focus {
            box-shadow: 0 0 0 3px rgba(197, 163, 90, 0.3);
        }
        .filter-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            z-index: 1;
            position: relative;
        }
        .filter-tab {
            padding: 8px 18px;
            border-radius: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--cream);
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: 0.3s;
            font-size: 0.9em;
        }
        .filter-tab.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }
        .filter-tab:hover {
            border-color: var(--gold);
            background: rgba(197, 163, 90, 0.15);
        }
        .pencarian-container {
            background: rgba(30, 20, 20, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .pencarian-container .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pencarian-container label {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--gold);
        }
        .pencarian-container input[type="text"],
        .pencarian-container input[type="number"] {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--dark);
            color: var(--cream);
            font-family: inherit;
            font-size: 1em;
            outline: none;
            transition: 0.3s;
        }
        .pencarian-container input[type="text"]:focus,
        .pencarian-container input[type="number"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(197, 163, 90, 0.2);
        }
        .pencarian-container input[type="text"] {
            width: 260px;
        }
        .pencarian-container input[type="number"] {
            width: 100px;
        }
        .btn-tambah {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1em;
            background: var(--gold);
            color: var(--dark);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-family: inherit;
            transition: 0.3s;
            align-self: flex-end;
        }
        .btn-tambah:hover {
            background: #d4b368;
            box-shadow: 0 6px 20px rgba(197, 163, 90, 0.5);
            transform: translateY(-2px);
        }
        .keranjang-container {
            position: relative;
            z-index: 1;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(30, 20, 20, 0.7);
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
            min-width: 600px;
        }
        thead th {
            background: #3b2f2f;
            color: var(--gold);
            padding: 14px 10px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tbody td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(139, 125, 107, 0.25);
            color: var(--cream);
        }
        tbody tr:hover {
            background: rgba(197, 163, 90, 0.08);
        }
        .item-name {
            text-align: left;
            padding-left: 16px;
        }
        .harga-input,
        .qty-input-keranjang {
            width: 90px;
            padding: 8px;
            text-align: center;
            background: #2a1a1a;
            border: 1px solid var(--border);
            color: var(--cream);
            border-radius: 8px;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.95em;
            transition: 0.3s;
        }
        .harga-input:focus,
        .qty-input-keranjang:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(197, 163, 90, 0.2);
            background: #1e1410;
        }
        .subtotal-cell {
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }
        .btn-hapus {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2em;
            transition: 0.3s;
        }
        .btn-hapus:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }
        .total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px 20px;
            background: rgba(197, 163, 90, 0.08);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        .total-section .label-total {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .total-section .value-total {
            font-size: 1.8em;
            font-weight: 800;
            color: #fff;
            background: var(--dark);
            padding: 6px 20px;
            border-radius: 10px;
            border: 1px solid var(--gold);
        }
        .rekap-section {
            background: rgba(30, 20, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        .rekap-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.2em;
            letter-spacing: 1px;
            text-align: center;
            text-transform: uppercase;
        }
        .rekap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        .rekap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(42, 26, 26, 0.7);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(197, 163, 90, 0.2);
            transition: 0.3s;
            flex-wrap: wrap;
        }
        .rekap-item:hover {
            border-color: var(--gold);
            background: rgba(197, 163, 90, 0.12);
        }
        .rekap-nama {
            font-weight: 600;
            color: var(--cream);
            font-size: 0.9em;
            flex: 1 1 auto;
        }
        .rekap-info {
            text-align: right;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .rekap-stok {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .rekap-qty {
            color: var(--gold);
            font-weight: 700;
        }
        .rekap-total {
            color: #fff;
            font-weight: 700;
        }
        .stok-awal {
            color: #aaa;
            font-size: 0.8em;
        }
        .stok-sisa {
            color: var(--success);
            font-weight: 700;
        }
        .stok-habis {
            color: var(--danger);
            font-weight: 700;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            position: relative;
        }
        .btn {
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            letter-spacing: 0.5px;
            border: none;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .btn-stok {
            background: rgba(197, 163, 90, 0.15);
            color: var(--gold);
            border: 1px solid var(--gold);
            margin-bottom: 15px;
        }
        .btn-teks {
            background: var(--cream);
            color: var(--dark);
        }
        .btn-teks:hover {
            background: #fff;
            box-shadow: 0 6px 20px rgba(245, 230, 211, 0.4);
            transform: translateY(-2px);
        }
        .btn-gambar {
            background: var(--gold);
            color: var(--dark);
        }
        .btn-gambar:hover {
            background: #d4b368;
            box-shadow: 0 6px 20px rgba(197, 163, 90, 0.5);
            transform: translateY(-2px);
        }
        .btn-pdf {
            background: var(--dark);
            color: var(--gold);
            border: 2px solid var(--gold);
        }
        .btn-pdf:hover {
            background: #3b2f2f;
            box-shadow: 0 6px 20px rgba(197, 163, 90, 0.3);
            transform: translateY(-2px);
        }
        .btn-reset {
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
        }
        .btn-reset:hover {
            color: #fff;
            border-color: #fff;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .notif-simpan {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s ease;
            pointer-events: none;
        }
        .notif-simpan.muncul {
            opacity: 1;
            transform: translateY(0);
        }
        .text-center {
            text-align: center;
            color: var(--gray);
            padding: 15px;
        }
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
            }
            .main-container {
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                border-radius: 0;
                padding: 20px;
            }
            .header .logo-text {
                color: #000 !important;
                text-shadow: none !important;
            }
            .header .sub-logo {
                color: #333 !important;
            }
            .header .divider {
                background: #000 !important;
            }
            thead th {
                background: #eee !important;
                color: #000 !important;
                border-bottom: 2px solid #000 !important;
            }
            tbody td {
                color: #000 !important;
                border-bottom: 1px solid #ccc !important;
            }
            .harga-input,
            .qty-input-keranjang {
                border: 1px solid #ccc !important;
                background: #fff !important;
                color: #000 !important;
            }
            .subtotal-cell {
                color: #000 !important;
            }
            .total-section,
            .rekap-section {
                background: #fafafa !important;
                border: 1px solid #ccc !important;
            }
            .total-section .label-total {
                color: #000 !important;
            }
            .total-section .value-total {
                background: #fff !important;
                color: #000 !important;
                border: 1px solid #000 !important;
            }
            .rekap-section h3 {
                color: #000 !important;
            }
            .rekap-item {
                background: #fff !important;
                border: 1px solid #ccc !important;
            }
            .rekap-nama {
                color: #000 !important;
            }
            .rekap-qty {
                color: #000 !important;
            }
            .rekap-total {
                color: #000 !important;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-container" id="exportArea">
        <div class="header">
            <div class="logo-text">Galeri Ar-Rijal Dar'el</div>
            <div class="sub-logo">Darul Ilmi — Gagah Beradab</div>
            <div class="divider"></div>
        </div>

        <div class="date-section">
            <label for="tanggalInput">📅 Tanggal Penjualan:</label>
            <input type="date" id="tanggalInput" required>
        </div>

        <div class="filter-tabs no-print">
            <button class="filter-tab active" data-filter="tanggal">📆 Hari Ini</button>
            <button class="filter-tab" data-filter="semua">🗂️ Semua Data</button>
        </div>

        <div class="pencarian-container no-print" id="pencarianContainer">
            <div class="field">
                <label for="searchBarang">🔍 Cari Nama Barang</label>
                <input type="text" id="searchBarang" list="barangList" placeholder="Ketik nama barang..." autocomplete="off">
                <datalist id="barangList"></datalist>
            </div>
            <div class="field">
                <label for="jumlahBarang">🔢 Jumlah</label>
                <input type="number" id="jumlahBarang" min="1" value="1" placeholder="1">
            </div>
            <button class="btn-tambah" onclick="tambahBarang()">➕ Tambah</button>
        </div>

        <div class="keranjang-container" id="keranjangContainer">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Barang</th>
                            <th>Harga Satuan (Rp)</th>
                            <th>Jumlah</th>
                            <th>Subtotal (Rp)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyKeranjang">
                        <tr><td colspan="6" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="total-section">
                <span class="label-total">💰 TOTAL PENDAPATAN</span>
                <span class="value-total" id="totalPendapatan">Rp 0</span>
            </div>

            <div class="rekap-section" id="rekapSection">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin-bottom:0;">📊 Rekap Penjualan & Stok</h3>
                    <button class="btn btn-stok no-print" onclick="toggleTampilSemuaStok()">📦 Semua Stok</button>
                </div>
                <div class="rekap-grid" id="rekapGrid" style="margin-top:15px;">
                    <div class="text-center">Belum ada data</div>
                </div>
            </div>
        </div>

        <div class="btn-group no-print">
            <button class="btn btn-teks" onclick="eksporTeks()">📝 Ekspor Teks</button>
            <button class="btn btn-gambar" onclick="eksporGambar()">🖼️ Ekspor Gambar</button>
            <button class="btn btn-pdf" onclick="eksporPDF()">🖨️ Ekspor PDF</button>
            <button class="btn btn-reset" onclick="resetKeranjang()">🔄 Reset</button>
        </div>
    </div>

    <div class="notif-simpan" id="notifSimpan">✅ Data tersimpan</div>

            'Jasa Jahit & Vermak': 9999,
            'Gamis Panjang': 0,
            'Gamis Putih': 10,
            'Gamis Warna': 13,
        };

        let semuaData = [];
        let idCounter = 1;
        let filterAktif = 'tanggal';
        let keranjang = [];
        let tampilSemuaStok = false;

        const tglInput = document.getElementById('tanggalInput');
        tglInput.value = new Date().toISOString().split('T')[0];

        function renderDatalist() {
            const datalist = document.getElementById('barangList');
            datalist.innerHTML = '';
            daftarBarang.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.nama;
                datalist.appendChild(opt);
            });
        }
        renderDatalist();

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                filterAktif = this.getAttribute('data-filter');
                renderDataDifilter();
            });
        });

        tglInput.addEventListener('change', () => {
            if (filterAktif === 'tanggal') renderDataDifilter();
        });

        function getDataDifilter() {
            if (filterAktif === 'tanggal') {
                return semuaData.filter(item => item.tanggal === tglInput.value);
            }
            return semuaData;
        }

        function renderDataDifilter() {
            keranjang = getDataDifilter().map(item => ({
                id: Number(item.id),
                nama: item.nama,
                harga: Number(item.harga),
                jumlah: Number(item.jumlah),
            }));
            idCounter = keranjang.length > 0 ? Math.max(...keranjang.map(it => it.id)) + 1 : 1;
            renderKeranjang();
            renderStok();
        }

        // ================= KOMUNIKASI GOOGLE SHEETS =================
        async function fetchData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                semuaData = data.map(item => ({
                    id: Number(item.id),
                    nama: item.nama,
                    harga: Number(item.harga),
                    jumlah: Number(item.jumlah),
                    tanggal: item.tanggal || '',
                }));
                renderDataDifilter();
            } catch (err) {
                document.getElementById('tbodyKeranjang').innerHTML =
                    '<tr><td colspan="6" style="text-align:center; padding:30px; color:#e74c3c;">❌ Gagal menghubungi server. Periksa URL Apps Script.</td></tr>';
            }
        }

        async function simpanKeSheet(action, params) {
            const formData = new FormData();
            formData.append('action', action);
            for (const key in params) formData.append(key, params[key]);
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                notifSimpan('✅ Data tersimpan');
            } catch (err) {
                alert('Gagal menyimpan ke server.');
            }
        }

        function notifSimpan(teks) {
            const notif = document.getElementById('notifSimpan');
            notif.textContent = teks;
            notif.classList.add('muncul');
            clearTimeout(notif._timeout);
            notif._timeout = setTimeout(() => notif.classList.remove('muncul'), 1500);
        }

        // ================= OPERASI KERANJANG =================
        function getStokTersisa(namaBarang) {
            const awal = stokAwal[namaBarang] || 0;
            const totalTerjual = semuaData
                .filter(item => item.nama === namaBarang)
                .reduce((sum, item) => sum + item.jumlah, 0);
            return Math.max(0, awal - totalTerjual);
        }

        function tambahBarang() {
            const nama = document.getElementById('searchBarang').value.trim();
            const jumlah = parseInt(document.getElementById('jumlahBarang').value) || 1;
            if (!nama) return alert('⚠️ Silakan ketik atau pilih nama barang.');
            if (jumlah < 1) return alert('⚠️ Jumlah minimal 1.');

            const stokCukup = getStokTersisa(nama);
            if (jumlah > stokCukup) {
                alert(`⚠️ Stok tidak cukup! Stok tersisa: ${stokCukup} pcs.`);
                return;
            }

            let hargaDefault = 0;
            const found = daftarBarang.find(b => b.nama.toLowerCase() === nama.toLowerCase());
            if (found) hargaDefault = found.harga || 0;

            const idBaru = idCounter++;
            const itemBaru = { id: idBaru, nama, harga: hargaDefault, jumlah, tanggal: tglInput.value };
            semuaData.push(itemBaru);
            simpanKeSheet('tambah', { id: idBaru, nama, harga: hargaDefault, jumlah, tanggal: tglInput.value });

            document.getElementById('searchBarang').value = '';
            document.getElementById('jumlahBarang').value = 1;
            renderDataDifilter();
        }

        function hapusItem(id) {
            semuaData = semuaData.filter(item => Number(item.id) !== id);
            simpanKeSheet('hapus', { id });
            renderDataDifilter();
        }

        function updateHarga(input) {
            const id = parseInt(input.getAttribute('data-id'));
            const item = semuaData.find(it => Number(it.id) === id);
            if (item) {
                item.harga = parseInt(input.value) || 0;
                simpanKeSheet('update', { id, harga: item.harga, jumlah: item.jumlah });
            }
            renderDataDifilter();
        }

        function updateJumlah(input) {
            const id = parseInt(input.getAttribute('data-id'));
            const item = semuaData.find(it => Number(it.id) === id);
            if (item) {
                const newJumlah = parseInt(input.value) || 1;
                const stokSekarang = getStokTersisa(item.nama) + item.jumlah; // kembalikan stok sebelum pengurangan
                if (newJumlah > stokSekarang) {
                    alert(`⚠️ Jumlah melebihi stok! Stok tersedia: ${stokSekarang} (termasuk jumlah sebelumnya).`);
                    input.value = item.jumlah;
                    return;
                }
                item.jumlah = newJumlah;
                simpanKeSheet('update', { id, harga: item.harga, jumlah: newJumlah });
            }
            renderDataDifilter();
        }

        function renderKeranjang() {
            const tbody = document.getElementById('tbodyKeranjang');
            if (keranjang.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Belum ada barang ditambahkan untuk filter ini.</td></tr>';
                document.getElementById('totalPendapatan').textContent = 'Rp 0';
                return;
            }
            let html = '';
            keranjang.forEach((item, i) => {
                const sub = item.harga * item.jumlah;
                html += `<tr data-id="${item.id}">
                    <td>${i + 1}</td><td class="item-name">${item.nama}</td>
                    <td><input type="number" class="harga-input" value="${item.harga}" min="0" data-id="${item.id}" onchange="updateHarga(this)"></td>
                    <td><input type="number" class="qty-input-keranjang" value="${item.jumlah}" min="1" data-id="${item.id}" onchange="updateJumlah(this)"></td>
                    <td class="subtotal-cell">Rp ${sub.toLocaleString('id-ID')}</td>
                    <td><button class="btn-hapus" onclick="hapusItem(${item.id})">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
            const total = keranjang.reduce((s, it) => s + (it.harga * it.jumlah), 0);
            document.getElementById('totalPendapatan').textContent = 'Rp ' + total.toLocaleString('id-ID');
        }

        function renderStok() {
            const grid = document.getElementById('rekapGrid');
            const rekapMap = {};
            const dataTampil = getDataDifilter();

            // Hitung penjualan hari ini (untuk rekap harian)
            dataTampil.forEach(item => {
                if (!rekapMap[item.nama]) rekapMap[item.nama] = { terjual: 0, total: 0 };
                rekapMap[item.nama].terjual += item.jumlah;
                rekapMap[item.nama].total += item.harga * item.jumlah;
            });

            // Daftar barang yang ingin ditampilkan: jika filter 'tanggal' dan tampilSemuaStok true, tampilkan semua stok; jika tidak, hanya yang ada penjualan
            const semuaNamaBarang = Object.keys(stokAwal);
            let daftarTampil = [];
            if (filterAktif === 'semua' || tampilSemuaStok) {
                daftarTampil = semuaNamaBarang;
            } else {
                daftarTampil = Object.keys(rekapMap);
            }

            if (daftarTampil.length === 0) {
                grid.innerHTML = '<div class="text-center">Belum ada data penjualan</div>';
                return;
            }

            // Urutkan: yang ada penjualan di atas
            daftarTampil.sort((a, b) => {
                const aTerjual = rekapMap[a]?.terjual || 0;
                const bTerjual = rekapMap[b]?.terjual || 0;
                return bTerjual - aTerjual;
            });

            let html = '';
            daftarTampil.forEach(nama => {
                const awal = stokAwal[nama] || 0;
                const totalTerjualSemua = semuaData
                    .filter(item => item.nama === nama)
                    .reduce((sum, item) => sum + item.jumlah, 0);
                const sisa = Math.max(0, awal - totalTerjualSemua);
                const terjualHariIni = rekapMap[nama]?.terjual || 0;
                const totalHariIni = rekapMap[nama]?.total || 0;
                const stokClass = sisa === 0 ? 'stok-habis' : 'stok-sisa';

                html += `<div class="rekap-item">
                    <span class="rekap-nama">${nama}</span>
                    <div class="rekap-info">
                        <div class="rekap-stok">
                            <span class="stok-awal">Awal: ${awal}</span> &nbsp;
                            <span class="rekap-qty">Terjual: ${terjualHariIni} pcs</span> &nbsp;
                            <span class="${stokClass}">Sisa: ${sisa}</span>
                        </div>
                        ${terjualHariIni > 0 ? `<div class="rekap-total">Rp ${totalHariIni.toLocaleString('id-ID')}</div>` : ''}
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        function toggleTampilSemuaStok() {
            tampilSemuaStok = !tampilSemuaStok;
            const btn = document.querySelector('.btn-stok');
            btn.textContent = tampilSemuaStok ? '📦 Sembunyikan Stok' : '📦 Semua Stok';
            renderStok();
        }

        async function resetKeranjang() {
            if (!keranjang.length) return;
            if (confirm('Hapus semua data yang sedang difilter?')) {
                const ids = getDataDifilter().map(it => it.id);
                semuaData = semuaData.filter(it => !ids.includes(Number(it.id)));
                await simpanKeSheet('reset', {});
                renderDataDifilter();
            }
        }

        // ================= EKSPOR =================
        function getTanggalISO() { return tglInput.value; }

        function eksporTeks() {
            const data = getDataDifilter();
            if (!data.length) return alert('⚠️ Tidak ada data.');
            let teks = '══════════════════\n  GALERI AR-RIJAL DAR\'EL\n  Laporan Penjualan\n══════════════════\n';
            teks += 'Tanggal : ' + (filterAktif === 'tanggal' ? tglInput.value : 'Semua') + '\n';
            teks += '──────────────────\nNO | NAMA BARANG | HARGA | QTY | SUBTOTAL\n';
            data.forEach((it, i) => teks += `${i+1}. ${it.nama} | Rp ${it.harga} | ${it.jumlah} | Rp ${it.harga*it.jumlah}\n`);
            teks += '──────────────────\nTOTAL : Rp ' + data.reduce((s, i) => s + i.harga * i.jumlah, 0) + '\n';
            downloadFile(teks, 'penjualan-' + getTanggalISO() + '.txt', 'text/plain');
        }

        function eksporGambar() {
            if (!getDataDifilter().length) return alert('⚠️ Tidak ada data.');
            html2canvas(document.getElementById('exportArea'), {
                backgroundColor: '#1a0f0f',
                scale: 2,
                ignoreElements: el => el.classList.contains('no-print')
            }).then(c => {
                const a = document.createElement('a');
                a.download = 'penjualan-' + getTanggalISO() + '.png';
                a.href = c.toDataURL('image/png');
                a.click();
            });
        }

        function eksporPDF() {
            if (!getDataDifilter().length) return alert('⚠️ Tidak ada data.');
            window.print();
        }

        function downloadFile(c, f, m) {
            const b = new Blob([c], { type: m });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = f;
            a.click();
        }

        fetchData();
    </script>
</body>
</html>
